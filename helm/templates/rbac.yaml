{{- if .Values.rbac.create -}}
---
# ServiceAccount for Todo Chatbot AI Agents (FR-017)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "todo-chatbot.serviceAccountName" . }}
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}

---
# ClusterRole for kubectl-ai and kagent AI agents
# Enables: get, list, watch, describe pods/deployments/services for cluster introspection
# Enables: patch deployments for scaling operations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "todo-chatbot.fullname" . }}-agent-role
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}
rules:
# Permissions for kubectl-ai and kagent cluster analysis and operations
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "describe"]

- apiGroups: [""]
  resources: ["pods/logs"]
  verbs: ["get"]

- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
  verbs: ["get", "list", "watch", "describe", "patch"]

- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]

- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding to grant agent role to ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "todo-chatbot.fullname" . }}-agent-binding
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "todo-chatbot.fullname" . }}-agent-role
subjects:
- kind: ServiceAccount
  name: {{ include "todo-chatbot.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
