apiVersion: v1
kind: Service
metadata:
  name: {{ include "todo-chatbot.fullname" . }}-backend
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}
    app: todo-backend
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.backend.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "todo-chatbot.backend.selectorLabels" . | nindent 4 }}
