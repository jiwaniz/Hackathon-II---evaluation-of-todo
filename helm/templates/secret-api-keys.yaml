# Secret template for API keys
# Note: In a real environment, these should be managed by external secret management systems
# (HashiCorp Vault, AWS Secrets Manager, etc.) rather than stored as ConfigMaps or helm values
#
# For local Minikube development, create secrets via:
# kubectl create secret generic todo-secrets \
#   --from-literal=GROQ_API_KEY='your-groq-key' \
#   --from-literal=BETTER_AUTH_SECRET='your-auth-secret' \
#   --from-literal=KUBECTL_AI_KEY='your-kubectl-ai-key' \
#   --from-literal=KAGENT_KEY='your-kagent-key'

# This file serves as documentation of what secrets are required.
# The actual secret creation is handled manually or by a secret management system.
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "todo-chatbot.fullname" . }}-api-keys
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}
  annotations:
    description: "API keys for Groq, Better Auth, and kubectl-ai integration"
type: Opaque
data:
  # Base64 encoded values (replace with actual values)
  # GROQ_API_KEY: <base64-encoded-groq-api-key>
  # BETTER_AUTH_SECRET: <base64-encoded-better-auth-secret>
  # KUBECTL_AI_KEY: <base64-encoded-kubectl-ai-key>
  # KAGENT_KEY: <base64-encoded-kagent-key>

  # Example for testing (NEVER use in production):
  # GROQ_API_KEY: Z3NrX2V4YW1wbGU=  # base64("gsk_example")
  # BETTER_AUTH_SECRET: aHMyNTYtc2VjcmV0LWtleQ==  # base64("hs256-secret-key")
  # KUBECTL_AI_KEY: b3BlbmFpLWtleS1leGFtcGxl  # base64("openai-key-example")
