apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "todo-chatbot.fullname" . }}-frontend-config
  labels:
    {{- include "todo-chatbot.labels" . | nindent 4 }}
    app: todo-frontend
data:
  # Backend API endpoint (accessible from frontend pods)
  NEXT_PUBLIC_API_URL: {{ .Values.frontend.environment.NEXT_PUBLIC_API_URL | quote }}

  # Better Auth callback URL (FR-018: Dynamic parameterization)
  # This MUST match the URL the user types in their browser:
  # - Port-forward: http://localhost:3000
  # - K8s service: http://todo-frontend:3000 (not used from browser)
  # - Ingress: http://todo.local:3000
  # The Better Auth provider dashboard must have this URL registered as a valid redirect URI
  BETTER_AUTH_URL: {{ .Values.frontend.environment.BETTER_AUTH_URL | quote }}

  # Trusted origins for Better Auth CORS (FR-018)
  # Comma-separated list of all possible frontend URLs
  TRUSTED_ORIGINS: {{ .Values.frontend.environment.TRUSTED_ORIGINS | quote }}

  # Frontend configuration
  NODE_ENV: "production"
  LOG_LEVEL: "info"

  # Next.js configuration
  NEXT_PUBLIC_APP_NAME: "Todo Chatbot"
  NEXT_PUBLIC_APP_VERSION: "1.0.0"
