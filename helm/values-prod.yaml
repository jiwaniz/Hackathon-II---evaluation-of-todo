replicaCount: 1

backend:
  image: todo-backend:latest
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  initContainer:
    enabled: false
  environment:
    DATABASE_URL: "sqlite:///test.db"
    LOG_LEVEL: INFO

frontend:
  image: todo-frontend:latest
  imagePullPolicy: IfNotPresent
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi
